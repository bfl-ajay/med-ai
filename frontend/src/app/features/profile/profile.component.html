<div class="container">
  <div class="card profile-card">
    <h2>Profile Settings</h2>

    <form class="profile-form" *ngIf="user">

      <!-- BASIC INFO -->
      <div class="form-group">
        <label>Name</label>
        <input [(ngModel)]="user.name" name="name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="user.email" name="email" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Age</label>
          <input type="number" [(ngModel)]="user.age" name="age" />
        </div>

        <div class="form-group">
          <label>Blood Group</label>
          <input [(ngModel)]="user.bloodGroup" name="bloodGroup" />
        </div>
      </div>

      <!-- BODY INFO -->
      <div class="form-row">
        <div class="form-group">
          <label>Height (cm)</label>
          <input type="number" [(ngModel)]="user.height" name="height" />
        </div>

        <div class="form-group">
          <label>Weight (kg)</label>
          <input type="number" [(ngModel)]="user.weight" name="weight" />
        </div>
      </div>

      <!-- KNOWN DISEASES -->
      <div class="form-group">
        <label>Known Diseases</label>
        <textarea
          rows="3"
          placeholder="Separate by commas (e.g. Diabetes, Asthma)"
          [(ngModel)]="knownDiseasesText"
          name="knownDiseases">
        </textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="save-btn" (click)="saveProfile()">
          Save Changes
        </button>
      </div>

    </form>
  </div>

</div>
