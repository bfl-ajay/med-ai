<div class="login-container">

  <div class="login-wrapper">

    <!-- Left Side - Branding -->
    <div class="login-left">
      <h1>Health Adviser</h1>
      <p>
        Smart digital health monitoring platform to track vitals,
        manage prescriptions and receive AI-powered insights.
      </p>
    </div>

    <!-- Right Side - Login Card -->
    <div class="login-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to continue to your dashboard</p>

      <!-- Error Message -->
      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- Email -->
      <div class="input-group">
        <input type="email" placeholder="Email address" [(ngModel)]="email" name="email" required>
      </div>

      <!-- Password -->
      <!-- Password -->
      <div class="input-group">
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Password" [(ngModel)]="password"
            name="password" required>

          <span class="toggle-password" (click)="showPassword = !showPassword">
            {{ showPassword ? 'Hide' : 'Show' }}
          </span>
        </div>
      </div>

      <!-- Options -->
      <div class="options">
        <div class="remember">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="#">Forgot Password?</a>
      </div>

      <!-- Button -->
      <button (click)="login()">Login</button>

      <!-- Register -->
      <p class="register-link">
        Don’t have an account?
        <a routerLink="/register">Create Account</a>
      </p>

    </div>
  </div>
</div>
